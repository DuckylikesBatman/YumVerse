<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Mini Booking Bar</title>
<link href="trying.css" rel="stylesheet">


</head>
<body>

<form>
  <div class="bar">
    <div class="cell">
      <label for="guests">Guests</label>
      <select id="guests" name="guests">
        <option>1</option><option>2</option><option selected>3</option>
        <option>4</option><option>5</option><option>6</option>
      </select>
    </div>

    <div class="cell">
      <label for="time">Time</label>
      <select id="time" name="time">
        <option selected>All Times</option>
        <option>12:00</option><option>12:30</option><option>13:00</option>
        <option>19:00</option><option>19:30</option><option>20:00</option>
      </select>
    </div>

    <div class="cell">
      <label for="date">Date</label>
      <input id="date" name="date" type="date">
    </div>
  </div>
</form>

</body>
</html>
